services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: k-heroes-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - PORT=8000
    env_file:
      - .env
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    # restart: always


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: k-heroes-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    env_file:
      - .env
    depends_on:
      - backend
    # restart: always

volumes:
  frontend_node_modules: